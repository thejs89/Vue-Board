# /api/** → board-api (REST API 서버)
# /**    → board-web (Vue SPA 서버)

server {
    listen 80;

    # 파일 업로드 최대 크기 (application.yml max-file-size 와 맞춤)
    client_max_body_size 1024m;

    # REST API 요청 → board-api 컨테이너
    location /api/ {
        proxy_pass         http://board-api:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # 나머지 모든 요청 → board-web 컨테이너 (Vue SPA)
    location / {
        proxy_pass         http://board-web:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
